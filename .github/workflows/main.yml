name: Run autotest

on:
  workflow_dispatch:
    inputs:
      deployment_target:
        description: 'Select tests to run'
        required: true
        type: choice
        default: 'all'
        options:
          - all

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2t64 libgtk-3-0t64

      - name: Install Chrome + Chromedriver (matching versions)
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: 146
          install-chromedriver: true

      - name: Remove any old conflicting chromedriver
        run: |
          sudo rm -f /usr/local/bin/chromedriver /opt/hostedtoolcache/setup-chrome/chromedriver/*/chromedriver || true

      - name: Install Python packages
        run: pip install pytest selenium

      - name: Run tests
        run: xvfb-run -a pytest -v --tb=short

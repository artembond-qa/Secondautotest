name: Run autotest

on:
  workflow_dispatch:
    inputs:
      deployment_target:
        description: 'Select tests to run'
        required: true
        type: choice
        default: 'all'
        options:
          - all

jobs:
  run-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (минимальный рабочий набор для 24.04)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb \
            libnss3 \
            libnspr4 \
            libatk1.0-0t64 \
            libatk-bridge2.0-0t64 \
            libcups2t64 \
            libdbus-1-3 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            libatspi2.0-0t64 \
            libxshmfence1 \
            fonts-liberation

      - name: Setup Chrome + ChromeDriver
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true
          install-dependencies: true   # ← пусть action сам добавит что нужно

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install pytest selenium webdriver-manager

      - name: Run tests
        run: |
          xvfb-run -a --server-args="-screen 0 1920x1080x24" \
            pytest -v --tb=short --maxfail=1

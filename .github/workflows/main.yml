name: Run autotest

on:
  workflow_dispatch:
    inputs:
      deployment_target:
        description: 'Select tests to run'
        required: true
        type: choice
        default: 'all'
        options:
          - all

jobs:
  run-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'   # явно указываем версию

      - name: Setup Chrome + ChromeDriver
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable     # или 'latest', или конкретную 128 и т.д.
          install-chromedriver: true

      - name: Remove old conflicting chromedriver (если нужно)
        run: |
          sudo rm -f /usr/local/bin/chromedriver || true

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install pytest selenium webdriver-manager

      - name: Run tests
        run: xvfb-run -a pytest -v --tb=short

name: Run autotest

on:
  workflow_dispatch:
    inputs:
      deployment_target:
        description: 'Select tests to run'
        required: true
        type: choice
        default: 'all'
        options:
          - all

jobs:
  run-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (очень важно для Chrome + xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb \
            libnss3 \
            libnspr4 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libasound2 \
            libatspi2.0-0 \
            libxshmfence1

      - name: Setup Chrome + ChromeDriver
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true
          install-dependencies: true

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install pytest selenium webdriver-manager

      - name: Run tests
        run: xvfb-run -a --server-args="-screen 0 1920x1080x24" pytest -v --tb=short
